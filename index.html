<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seven Wonders of the World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="sw">
    <div class="brand">Seven Wonders</div>
    <div id="ghost">WONDER</div>
    <div class="dots" id="dots"></div>
    <div id="carousel"></div>
    <div class="bl">
      <p class="wn" id="wn">TAP A WONDER</p>
      <div class="navs">
        <button class="nb" id="bp" aria-label="Previous">&#8592;</button>
        <button class="nb" id="bn" aria-label="Next">&#8594;</button>
      </div>
    </div>
    <div class="disc" id="disc">Explore &#8594;</div>
    <div class="panel" id="panel">
      <button class="xbtn" id="xbtn" aria-label="Close">&#10005;</button>
      <h2 id="ptitle"></h2>
      <p id="pdesc"></p>
    </div>
    <div class="hint" id="hint">Tap center wonder to explore</div>
  </div>
  <script src="main.js"></script>
</body>
</html>
